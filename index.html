<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 개입 수준별 커머스 A/B Test — 쿠팡 스타일</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  background: #f4f4f4;
  color: #111;
  min-height: 100vh;
}

/* Top Control Bar */
.control-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #1a1a2e;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.control-bar h1 {
  color: #fff;
  font-size: 0.9rem;
  font-weight: 700;
  margin-right: auto;
}

.level-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.3);
  background: transparent;
  color: #ccc;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.level-btn:hover { border-color: #7c3aed; color: #fff; }
.level-btn.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }

/* Step Indicator */
.step-indicator {
  display: flex;
  justify-content: center;
  padding: 16px;
  gap: 4px;
  background: #fff;
  border-bottom: 1px solid #eee;
}

.step {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.75rem;
  color: #999;
  font-weight: 500;
}

.step.active { color: #e63946; font-weight: 700; }
.step-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
  border: 2px solid #ddd;
  color: #999;
}
.step.active .step-dot { border-color: #e63946; background: #e63946; color: #fff; }
.step-arrow { color: #ddd; margin: 0 4px; }

/* Phone Frame */
.phone-frame {
  max-width: 420px;
  margin: 20px auto;
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  overflow: hidden;
  border: 8px solid #222;
  min-height: 700px;
  position: relative;
}

.phone-header {
  background: #e63946;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.phone-header .logo {
  font-size: 1.1rem;
  font-weight: 800;
  color: #fff;
}

.phone-header .search-bar {
  flex: 1;
  background: #fff;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 0.8rem;
  color: #666;
}

/* PAGE: Product List */
.page { display: none; }
.page.visible { display: block; }

.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: #eee;
}

.product-card {
  background: #fff;
  padding: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.product-card:hover { background: #fafafa; }

.product-img {
  width: 100%;
  aspect-ratio: 1;
  background: #f8f0ff;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  margin-bottom: 8px;
}

.product-card .name {
  font-size: 0.8rem;
  font-weight: 500;
  line-height: 1.3;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.product-card .price {
  font-size: 1rem;
  font-weight: 800;
  color: #e63946;
}

.product-card .price .original {
  text-decoration: line-through;
  color: #999;
  font-size: 0.75rem;
  font-weight: 400;
  margin-left: 4px;
}

.product-card .badge-row {
  display: flex;
  gap: 4px;
  margin-top: 4px;
  flex-wrap: wrap;
}

.product-card .tag {
  font-size: 0.6rem;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 600;
}

.tag-rocket { background: #e63946; color: #fff; }
.tag-sale { background: #ff6b35; color: #fff; }
.tag-review { background: #f0f0f0; color: #666; }
.tag-ai { background: #7c3aed; color: #fff; }
.tag-timer { background: #111; color: #fff; }

.ai-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  background: rgba(124,58,237,0.9);
  color: #fff;
  font-size: 0.55rem;
  padding: 2px 5px;
  border-radius: 3px;
  font-weight: 700;
}

/* PAGE: Product Detail */
.detail-hero {
  width: 100%;
  aspect-ratio: 1;
  background: linear-gradient(135deg, #f8f0ff 0%, #ede7f6 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 6rem;
}

.detail-info {
  padding: 16px;
}

.detail-info .brand {
  font-size: 0.75rem;
  color: #888;
  margin-bottom: 4px;
}

.detail-info .title {
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 8px;
}

.detail-info .price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 12px;
}

.detail-info .discount {
  font-size: 1.3rem;
  font-weight: 800;
  color: #e63946;
}

.detail-info .final-price {
  font-size: 1.3rem;
  font-weight: 800;
}

.detail-info .original-price {
  font-size: 0.85rem;
  color: #999;
  text-decoration: line-through;
}

.detail-section {
  padding: 12px 16px;
  border-top: 8px solid #f4f4f4;
}

.detail-section h3 {
  font-size: 0.85rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.review-summary {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
}

.stars { color: #ffc107; font-size: 0.9rem; }
.review-count { font-size: 0.8rem; color: #666; }

.review-item {
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
}

.review-item .reviewer {
  font-size: 0.7rem;
  color: #999;
  margin-bottom: 2px;
}

.review-item .text {
  font-size: 0.8rem;
  line-height: 1.4;
}

/* AI Interventions Visual */
.ai-highlight {
  background: rgba(124,58,237,0.08);
  border: 1px solid rgba(124,58,237,0.2);
  border-radius: 8px;
  padding: 10px 12px;
  margin: 8px 0;
  position: relative;
}

.ai-highlight::before {
  content: 'AI';
  position: absolute;
  top: -8px;
  left: 8px;
  background: #7c3aed;
  color: #fff;
  font-size: 0.55rem;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 700;
}

.urgency-banner {
  background: linear-gradient(90deg, #e63946, #ff6b35);
  color: #fff;
  padding: 8px 16px;
  font-size: 0.8rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.timer {
  font-family: monospace;
  background: rgba(0,0,0,0.3);
  padding: 2px 8px;
  border-radius: 4px;
}

.social-proof {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: #e63946;
  padding: 6px 16px;
  background: #fff5f5;
}

.recommendation-bar {
  padding: 12px 16px;
  background: #f8f5ff;
  border-top: 1px solid #ede7f6;
}

.recommendation-bar h4 {
  font-size: 0.75rem;
  color: #7c3aed;
  font-weight: 700;
  margin-bottom: 8px;
}

.rec-items {
  display: flex;
  gap: 8px;
  overflow-x: auto;
}

.rec-item {
  min-width: 80px;
  text-align: center;
}

.rec-item .rec-img {
  width: 60px; height: 60px;
  border-radius: 8px;
  background: #f0e8ff;
  margin: 0 auto 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
}

.rec-item .rec-name {
  font-size: 0.65rem;
  color: #666;
}

/* PAGE: Cart/Ledger */
.cart-item {
  display: flex;
  gap: 12px;
  padding: 16px;
  border-bottom: 1px solid #f0f0f0;
}

.cart-thumb {
  width: 80px; height: 80px;
  background: #f8f0ff;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  flex-shrink: 0;
}

.cart-info { flex: 1; }
.cart-info .cart-name { font-size: 0.85rem; font-weight: 500; margin-bottom: 4px; }
.cart-info .cart-price { font-size: 1rem; font-weight: 800; }
.cart-info .cart-qty { font-size: 0.75rem; color: #888; margin-top: 4px; }

.cart-summary {
  padding: 16px;
  background: #fafafa;
  border-top: 1px solid #eee;
}

.cart-summary .row {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  margin-bottom: 6px;
}

.cart-summary .total {
  font-weight: 800;
  font-size: 1.1rem;
  border-top: 1px solid #ddd;
  padding-top: 8px;
  margin-top: 8px;
}

.nudge-box {
  background: #fff5f0;
  border: 1px solid #ffe0d0;
  border-radius: 8px;
  padding: 10px 12px;
  margin: 12px 16px;
  font-size: 0.8rem;
  color: #e63946;
  font-weight: 600;
}

/* PAGE: Complete */
.complete-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
}

.complete-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: #e8f5e9;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  margin-bottom: 16px;
}

.complete-page h2 {
  font-size: 1.3rem;
  font-weight: 800;
  margin-bottom: 8px;
}

.complete-page p {
  font-size: 0.85rem;
  color: #666;
  margin-bottom: 24px;
}

.share-prompt {
  background: #f8f5ff;
  border: 1px solid #ede7f6;
  border-radius: 12px;
  padding: 16px;
  width: 100%;
  text-align: left;
}

.share-prompt h4 {
  font-size: 0.8rem;
  font-weight: 700;
  color: #7c3aed;
  margin-bottom: 6px;
}

.share-prompt p {
  font-size: 0.75rem;
  color: #666;
  margin-bottom: 8px;
}

.share-btns {
  display: flex;
  gap: 8px;
}

.share-btn {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 0.7rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

.share-btn.blog { background: #00c73c; color: #fff; }
.share-btn.insta { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color: #fff; }

/* Bottom Action */
.bottom-action {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 16px;
  background: #fff;
  border-top: 1px solid #eee;
  display: flex;
  gap: 8px;
}

.btn-buy {
  flex: 1;
  padding: 14px;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 700;
  border: none;
  cursor: pointer;
  background: #e63946;
  color: #fff;
}

.btn-cart {
  padding: 14px 20px;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 700;
  border: 2px solid #e63946;
  background: #fff;
  color: #e63946;
  cursor: pointer;
}

.btn-next {
  flex: 1;
  padding: 14px;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 700;
  border: none;
  cursor: pointer;
  background: #7c3aed;
  color: #fff;
}

/* Side Panel - Metrics */
.side-panel {
  position: fixed;
  top: 52px;
  right: 0;
  width: 320px;
  height: calc(100vh - 52px);
  background: #fff;
  border-left: 1px solid #eee;
  overflow-y: auto;
  padding: 20px;
  display: none;
}

.side-panel.show { display: block; }

.metric-block {
  margin-bottom: 16px;
  padding: 12px;
  background: #f8f9fc;
  border-radius: 8px;
}

.metric-block .metric-label {
  font-size: 0.7rem;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.metric-block .metric-value {
  font-size: 1.4rem;
  font-weight: 800;
}

.metric-block .metric-delta {
  font-size: 0.75rem;
  margin-top: 2px;
}

.metric-delta.up { color: #10b981; }
.metric-delta.down { color: #ef4444; }

.intervention-list {
  list-style: none;
  margin-top: 16px;
}

.intervention-list li {
  font-size: 0.8rem;
  padding: 6px 0;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: center;
  gap: 6px;
}

.intervention-list .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dot.on { background: #7c3aed; }
.dot.off { background: #ddd; }

/* Responsive */
@media (max-width: 900px) {
  .side-panel { display: none !important; }
  .phone-frame {
    margin: 12px;
    border-radius: 16px;
    border-width: 4px;
    min-height: 600px;
  }
}

@media (max-width: 480px) {
  .control-bar { padding: 8px 12px; }
  .control-bar h1 { font-size: 0.75rem; width: 100%; margin-bottom: 6px; }
  .level-btn { font-size: 0.65rem; padding: 5px 10px; }
  .phone-frame { border: none; border-radius: 0; margin: 0; }
}
</style>
</head>
<body>

<!-- Control Bar -->
<div class="control-bar">

  { label: '사전 확산 구조 (블로그 예고)', levels: [3] },
  { label: '본문 콘텐츠 깊이 (어휘 다양성 ↑)', levels: [3] },
  { label: 'AI 개인화 추천 (피부타입 매칭)', levels: [3] },
  { label: '구매 후 리뷰 유도 (CQI 최적화)', levels: [3] },
];

function setLevel(l) {
  currentLevel = l;
  document.querySelectorAll('.level-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === l);
  });
  renderCurrentPage();
  renderMetrics();
  renderInterventions();
}

function setStep(s) {
  currentStep = s;
  document.querySelectorAll('.step').forEach((el, i) => {
    el.classList.toggle('active', i === s);
  });
  document.querySelectorAll('.page').forEach((el, i) => {
    el.classList.toggle('visible', i === s);
  });
  renderCurrentPage();
  updateBottomAction();
}

function nextStep() {
  if (currentStep < 3) setStep(currentStep + 1);
}

function updateBottomAction() {
  const ba = document.getElementById('bottom-action');
  if (currentStep === 0) {
    ba.innerHTML = '<button class="btn-buy" onclick="nextStep()">상품 선택하기</button>';
  } else if (currentStep === 1) {
    ba.innerHTML = '<button class="btn-cart" onclick="nextStep()">장바구니</button><button class="btn-buy" onclick="nextStep()">바로구매</button>';
  } else if (currentStep === 2) {
    ba.innerHTML = '<button class="btn-buy" onclick="nextStep()">결제하기</button>';
  } else {
    ba.innerHTML = '<button class="btn-next" onclick="setStep(0)">처음으로</button>';
  }
}

function renderCurrentPage() {
  switch(currentStep) {
    case 0: renderProductList(); break;
    case 1: renderProductDetail(); break;
    case 2: renderCart(); break;
    case 3: renderComplete(); break;
  }
}

function renderProductList() {
  const page = document.getElementById('page-0');

  if (currentLevel >= 2) {

  products.forEach((p, i) => {

        <div class="price">${discount}% <span style="color:#111">${p.price.toLocaleString()}원</span>
          <span class="original">${p.original.toLocaleString()}</span>

          <span class="tag tag-rocket">로켓배송</span>
          ${badges}
        </div>
      </div>

  });
  html += '</div>';

  if (currentLevel >= 3) {
    html += `<div class="recommendation-bar">
      <h4>당신의 피부타입(건성)에 맞는 추천</h4>
      <div class="rec-items">
        <div class="rec-item"><div class="rec-img">💧</div><span class="rec-name">수분 세럼</span></div>
        <div class="rec-item"><div class="rec-img">🧖</div><span class="rec-name">나이트팩</span></div>
        <div class="rec-item"><div class="rec-img">🌿</div><span class="rec-name">오일밤</span></div>
      </div>
    </div>`;

  page.innerHTML = html;
}

        <span style="color:#7c3aed;font-size:0.7rem;">→ 이 제목으로 작성 시 노출 확률 +47%</span>
      </p>
    </div>`;
  }

  html += '</div>';
  page.innerHTML = html;
}

function renderMetrics() {
  const m = metrics[currentLevel];
  const panel = document.getElementById('metrics-panel');
  const baseline = metrics[0];

  function delta(current, base) {
    const c = parseFloat(current);
    const b = parseFloat(base);
    if (isNaN(c) || isNaN(b) || b === 0) return '';
    const d = ((c - b) / b * 100).toFixed(0);
    if (d == 0) return '';
    return `<div class="metric-delta ${d > 0 ? 'up' : 'down'}">${d > 0 ? '▲' : '▼'} ${Math.abs(d)}% vs Control</div>`;
  }

  panel.innerHTML = `
    <div class="metric-block"><div class="metric-label">CTR (클릭률)</div><div class="metric-value">${m.ctr}</div>${delta(m.ctr, baseline.ctr)}</div>
    <div class="metric-block"><div class="metric-label">CVR (전환율)</div><div class="metric-value">${m.cvr}</div>${delta(m.cvr, baseline.cvr)}</div>
    <div class="metric-block"><div class="metric-label">AOV (객단가)</div><div class="metric-value">${m.aov}</div>${delta(m.aov.replace(/[^0-9]/g,''), baseline.aov.replace(/[^0-9]/g,''))}</div>
    <div class="metric-block"><div class="metric-label">리뷰 작성률</div><div class="metric-value">${m.retention}</div>${delta(m.retention, baseline.retention)}</div>
    <div class="metric-block"><div class="metric-label">오가닉 버즈</div><div class="metric-value">${m.buzz}</div>${delta(m.buzz, baseline.buzz)}</div>
  `;
}

function renderInterventions() {
  const list = document.getElementById('intervention-list');
  list.innerHTML = interventions.map(iv => {
    const on = iv.levels.includes(currentLevel);
    return `<li><span class="dot ${on ? 'on' : 'off'}"></span>${iv.label}</li>`;
  }).join('');
}

// Init
setLevel(0);
setStep(0);
</script>
